proxy_cache_path /var/cache/nginx/nara-announcements
    levels=1:2
    keys_zone=nara_announcements:10m
    max_size=50m
    inactive=5m
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/nara-public
    levels=1:2
    keys_zone=nara_public:20m
    max_size=200m
    inactive=10m
    use_temp_path=off;

# A request carrying any cookie is treated as personalized. This deliberately
# sacrifices some cache hits so member/admin responses can never be served
# from the anonymous public cache.
map "$http_cookie|$http_authorization" $nara_public_cache_bypass {
    "|"     0;
    default 1;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name nara001.co.kr www.nara001.co.kr;

    # The origin is private to Cloudflare. Direct-IP and hosts-file bypasses
    # must never reach the application.
    include /etc/nginx/snippets/nara001-cloudflare-allow.conf;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://www.nara001.co.kr$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    # Ubuntu 22.04 ships nginx 1.18, which predates ssl_reject_handshake.
    # Complete TLS with the existing certificate, then drop direct-IP and
    # unknown-host requests without forwarding them to the application.
    ssl_certificate /etc/letsencrypt/live/nara001.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nara001.co.kr/privkey.pem;
    return 444;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nara001.co.kr www.nara001.co.kr;

    ssl_certificate /etc/letsencrypt/live/nara001.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nara001.co.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:NARA_SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    include /etc/nginx/snippets/nara001-cloudflare-allow.conf;
    client_max_body_size 105m;

    # This endpoint intentionally contains public metadata only (id, expiry,
    # updatedAt). Collapse polling from all signed-in users into one origin
    # refresh per cache window; never forward or vary on member cookies.
    location = /api/announcements/active {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header Cookie "";
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache nara_announcements;
        proxy_cache_key "$scheme|$request_method|$host|$uri";
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 10s;
        proxy_cache_valid 304 10s;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_lock_age 5s;
        proxy_buffering on;
        proxy_hide_header Set-Cookie;
    }

    # Only these list endpoints have a well-defined anonymous representation.
    # Cookies bypass both lookup and storage; writes and detail endpoints never
    # enter this cache. The short TTL keeps moderation and jump ordering fresh.
    location ~ ^/api/(?:posts|featured-vendors|vendor-posts|events/leaderboard)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache nara_public;
        proxy_cache_key "$scheme|$host|$uri|$args";
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 5s;
        proxy_cache_valid 404 2s;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_lock_age 5s;
        proxy_cache_bypass $nara_public_cache_bypass;
        proxy_no_cache $nara_public_cache_bypass $upstream_http_set_cookie;
        # Some identity-aware handlers conservatively emit no-store even for
        # their anonymous representation. This cache has its own strict cookie
        # and Authorization bypass, so origin cache directives may be ignored
        # only inside this explicit anonymous allowlist.
        proxy_ignore_headers Cache-Control Expires;
        proxy_buffering on;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
